<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
<style>
    .header { font-family: Inter, sans-serif; font-size: 13px; font-weight: bold; fill: #d84315; text-anchor: middle; }
    .text { font-family: Inter, sans-serif; font-size: 11px; fill: #333; }
    .box-text { font-family: Inter, sans-serif; font-size: 11px; font-weight: bold; fill: #333; text-anchor: middle; }
    .red-text { fill: #c0392b; font-size: 11px; font-weight: bold; text-anchor: middle; }
    .blue-text { fill: #2980b9; font-size: 11px; font-weight: bold; text-anchor: middle; }
    .box { fill: #fff; stroke-width: 1.5; }
    .box-orange { stroke: #e67e22; }
    .box-gray { stroke: #7f8c8d; }
    .line { stroke-width: 1.5; fill: none; }
    .line-blue { stroke: #2980b9; }
    .line-red { stroke: #c0392b; }
    .grid-line { stroke: #e67e22; stroke-width: 1; opacity: 0.3; stroke-dasharray: 4 4; }
    .solid-line { stroke: #e67e22; stroke-width: 1; }
</style>
<defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#2980b9" />
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#c0392b" />
    </marker>
</defs>
<rect width="1000" height="1000" fill="#ffffff" />
<rect width="1000" height="40" fill="#fff3e0" class="solid-line" />
<line x1="0" y1="0" x2="0" y2="1000" class="solid-line" />
<line x1="100" y1="0" x2="100" y2="1000" class="solid-line" />
<line x1="200" y1="0" x2="200" y2="1000" class="solid-line" />
<line x1="300" y1="0" x2="300" y2="1000" class="solid-line" />
<line x1="400" y1="0" x2="400" y2="1000" class="solid-line" />
<line x1="750" y1="0" x2="750" y2="1000" class="solid-line" />
<line x1="830" y1="0" x2="830" y2="1000" class="solid-line" />
<line x1="1000" y1="0" x2="1000" y2="1000" class="solid-line" />
<line x1="0" y1="40" x2="1000" y2="40" class="grid-line" />
<line x1="0" y1="140" x2="1000" y2="140" class="grid-line" />
<line x1="0" y1="240" x2="1000" y2="240" class="grid-line" />
<line x1="0" y1="360" x2="1000" y2="360" class="grid-line" />
<line x1="0" y1="480" x2="1000" y2="480" class="grid-line" />
<line x1="0" y1="580" x2="1000" y2="580" class="grid-line" />
<line x1="0" y1="680" x2="1000" y2="680" class="grid-line" />
<line x1="0" y1="780" x2="1000" y2="780" class="grid-line" />
<line x1="0" y1="880" x2="1000" y2="880" class="grid-line" />
<line x1="0" y1="1000" x2="1000" y2="1000" class="grid-line" />
<text x="50" y="25" class="header">Trưởng BP</text>
<text x="150" y="25" class="header">GĐ Tài chính/TGĐ</text>
<text x="250" y="25" class="header">BP. YCMH</text>
<text x="350" y="25" class="header">P. Mua</text>
<text x="575" y="25" class="header">Mô tả chi tiết</text>
<text x="790" y="25" class="header">Thời gian</text>
<text x="915" y="25" class="header">Biểu mẫu</text>
<rect x="210" y="70" width="80" height="40" rx="15" class="box box-orange" />
<text x="250" y="84" class="box-text">1. Đề xuất</text>
<text x="250" y="98" class="box-text">mua hàng</text>
<polygon points="50,150 90,190 50,230 10,190" class="box box-orange" />
<text x="50" y="184" class="box-text">2. Xét</text>
<text x="50" y="198" class="box-text">duyệt</text>
<polygon points="150,260 190,300 150,340 110,300" class="box box-orange" />
<text x="150" y="294" class="box-text">3. Xét</text>
<text x="150" y="308" class="box-text">duyệt</text>
<rect x="310" y="395" width="80" height="50" rx="15" class="box box-gray" />
<text x="350" y="408" class="box-text">4. KT giá, tìm</text>
<text x="350" y="422" class="box-text">NCC, đặt hàng</text>
<text x="350" y="436" class="box-text">mẫu</text>
<polygon points="250,490 290,530 250,570 210,530" class="box box-orange" />
<text x="250" y="524" class="box-text">5. Duyệt</text>
<text x="250" y="538" class="box-text">mẫu</text>
<rect x="310" y="610" width="80" height="40" rx="15" class="box box-gray" />
<text x="350" y="630" class="box-text">6. Đặt hàng</text>
<polygon points="250,690 290,730 250,770 210,730" class="box box-orange" />
<text x="250" y="724" class="box-text">7. Nhận và</text>
<text x="250" y="738" class="box-text">KT hàng</text>
<rect x="205" y="810" width="90" height="40" rx="15" class="box box-orange" />
<text x="250" y="824" class="box-text">8.1. Trả hàng, xử</text>
<text x="250" y="838" class="box-text">lý với NCC</text>
<rect x="205" y="910" width="90" height="40" rx="15" class="box box-orange" />
<text x="250" y="930" class="box-text">8.2. Thanh toán</text>
<path d="M 210 90 L 50 90 L 50 150" class="line line-blue" marker-end="url(#arrow-blue)" />
<path d="M 10 190 L 20 190 L 20 50 L 250 50 L 250 70" class="line line-red" marker-end="url(#arrow-red)" />
<rect x="15" y="175" width="14" height="14" fill="#fff" />
<text x="30" y="185" class="red-text">No</text>
<path d="M 90 190 L 150 190 L 150 260" class="line line-blue" marker-end="url(#arrow-blue)" />
<rect x="105" y="175" width="21" height="14" fill="#fff" />
<text x="120" y="185" class="blue-text">Yes</text>
<path d="M 50 230 L 50 420 L 310 420" class="line line-blue" marker-end="url(#arrow-blue)" />
<path d="M 190 300 L 290 300 L 290 110 L 290 110" class="line line-red" marker-end="url(#arrow-red)" />
<rect x="205" y="285" width="14" height="14" fill="#fff" />
<text x="220" y="295" class="red-text">No</text>
<path d="M 150 340 L 150 405 L 360 405 L 360 395" class="line line-blue" marker-end="url(#arrow-blue)" />
<rect x="145" y="390" width="21" height="14" fill="#fff" />
<text x="160" y="400" class="blue-text">Yes</text>
<path d="M 310 420 L 250 420 L 250 490" class="line line-blue" marker-end="url(#arrow-blue)" />
<path d="M 290 530 L 330 530 L 330 445 L 330 445" class="line line-red" marker-end="url(#arrow-red)" />
<rect x="300" y="515" width="77" height="14" fill="#fff" />
<text x="315" y="525" class="red-text">Không duyệt</text>
<path d="M 250 570 L 250 630 L 310 630" class="line line-blue" marker-end="url(#arrow-blue)" />
<rect x="250" y="615" width="35" height="14" fill="#fff" />
<text x="265" y="625" class="blue-text">Duyệt</text>
<path d="M 310 630 L 250 630 L 250 690" class="line line-blue" marker-end="url(#arrow-blue)" />
<path d="M 290 730 L 330 730 L 330 830 L 295 830" class="line line-red" marker-end="url(#arrow-red)" />
<rect x="315" y="715" width="91" height="14" fill="#fff" />
<text x="330" y="725" class="red-text">Không đảm bảo</text>
<path d="M 250 770 L 250 910" class="line line-blue" marker-end="url(#arrow-blue)" />
<rect x="250" y="775" width="49" height="14" fill="#fff" />
<text x="265" y="785" class="blue-text">Đảm bảo</text>
<path d="M 295 830 L 380 830 L 380 650 L 380 650" class="line line-red" marker-end="url(#arrow-red)" />
<text x="410" y="60" class="text">1. Căn cứ vào nhu cầu thực tế phát sinh, các BP có yêu cầu</text>
<text x="410" y="76" class="text">sẽ lập phiếu đề nghị mua hàng để bán.</text>
<text x="410" y="92" class="text">Nếu BP. Yêu cầu mua hàng có thông tin NCC, giá thì</text>
<text x="410" y="108" class="text">cung cấp cho P. Mua để tham khảo.</text>
<text x="840" y="60" class="text">1+2+3. Phiếu</text>
<text x="840" y="76" class="text">yêu cầu mua hàng</text>
<text x="410" y="160" class="text">2. Trưởng BP. YCMH tiếp nhận yêu cầu xem xét</text>
<text x="410" y="176" class="text">tính hợp lý và phê duyệt yêu cầu.</text>
<text x="760" y="160" class="text">2. 4h</text>
<text x="410" y="260" class="text">3. Đối với các yêu cầu mua hàng trị giá dưới 20.000.000đ</text>
<text x="410" y="276" class="text">thì cần Trưởng BP phê duyệt.</text>
<text x="410" y="292" class="text">Đối với các yêu cầu mua hàng trị giá từ 20.000.000đ,</text>
<text x="410" y="308" class="text">sau khi được Trưởng BP duyệt, thì cần được thông qua</text>
<text x="410" y="324" class="text">bởi GĐ Tài chính, trước khi trình lên TGĐ phê duyệt.</text>
<text x="760" y="260" class="text">3. GĐ Tài chính:</text>
<text x="760" y="276" class="text">4h</text>
<text x="760" y="292" class="text">TGĐ: 4h</text>
<text x="410" y="380" class="text">4. Căn cứ vào DS NCC đã được duyệt P. Mua liên hệ</text>
<text x="410" y="396" class="text">lấy giá mới và KT lại giá trước đặt hàng.</text>
<text x="410" y="412" class="text">Nếu chưa có NCC thì phải tìm ít nhất 3 NCC</text>
<text x="410" y="428" class="text">để so sánh và lựa chọn NCC phù hợp.</text>
<text x="760" y="380" class="text">4. Chốt NCC:</text>
<text x="760" y="396" class="text">16h</text>
<text x="840" y="380" class="text">4. Báo giá</text>
<text x="410" y="500" class="text">5. BP. YCMH làm việc với NCC về mẫu để thống nhất</text>
<text x="410" y="516" class="text">hình dáng và chất lượng hàng hóa.</text>
<text x="410" y="532" class="text">TH NCC không đáp ứng được yêu cầu hàng hóa</text>
<text x="410" y="548" class="text">yêu cầu P. Mua tìm kiếm lại NCC khác.</text>
<text x="760" y="500" class="text">5. 16h</text>
<text x="410" y="600" class="text">6. Sau khi đã chốt mẫu và chất lượng hàng hóa.</text>
<text x="410" y="616" class="text">P. Mua tiến hành đặt hàng, ký hợp đồng (nếu có)</text>
<text x="410" y="632" class="text">và thông báo thời gian nhận hàng cho BP. YCMH.</text>
<text x="410" y="648" class="text">Lập KH thanh toán và gửi HĐ cho Kế toán.</text>
<text x="760" y="600" class="text">6. 4h</text>
<text x="840" y="600" class="text">6. Đơn đặt hàng</text>
<text x="840" y="616" class="text">Hợp đồng (nếu có)</text>
<text x="410" y="700" class="text">7. BP. YCMH KT và nhận hàng hóa, KT kỹ về chất</text>
<text x="410" y="716" class="text">lượng và số lượng hàng hóa, đảm bảo chỉ nhận khi</text>
<text x="410" y="732" class="text">hàng đúng, đủ số lượng và chất lượng.</text>
<text x="410" y="748" class="text">Chuyển chứng từ nhận hàng cho P. Mua để làm thủ</text>
<text x="410" y="764" class="text">tục thanh toán cho NCC.</text>
<text x="840" y="700" class="text">7. Phiếu nhận hàng</text>
<text x="840" y="716" class="text">Phiếu nhập kho</text>
<text x="410" y="800" class="text">8.1. TH hàng hóa không đảm bảo chất lượng và</text>
<text x="410" y="816" class="text">số lượng, BP. YCMH từ chối nhận hàng, thông báo</text>
<text x="410" y="832" class="text">lại cho P. Mua để làm việc, xử lý với NCC.</text>
<text x="840" y="800" class="text">8.2. Phiếu YCMH</text>
<text x="840" y="816" class="text">theo mẫu</text>
<text x="840" y="832" class="text">Hóa đơn</text>
<text x="840" y="848" class="text">BB giao nhận hàng</text>
<text x="840" y="864" class="text">Phiếu đề nghị thanh</text>
<text x="840" y="880" class="text">toán theo mẫu</text>
<text x="840" y="896" class="text">Bảng giá duyệt</text>
<text x="410" y="900" class="text">8.2. Hoàn thiện HS thanh toán, lập phiếu đề nghị</text>
<text x="410" y="916" class="text">thanh toán cho NCC theo QT thanh toán.</text>
</svg>